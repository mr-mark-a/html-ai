    // Render categories
    const categoryContainer = document.getElementById('categories');
    Object.keys(faqDatabase).forEach(category => {
      const btn = document.createElement('button');
      btn.className = 'category-btn active';
      btn.textContent = category;
      btn.onclick = () => filterByCategory(category);
      categoryContainer.appendChild(btn);
    });

    // Render all FAQs initially
    renderAllFAQs();

    function renderAllFAQs() {
      const container = document.getElementById('faqContainer');
      container.innerHTML = '';
      
      let totalCount = 0;
      Object.entries(faqDatabase).forEach(([category, items]) => {
        const categoryTitle = document.createElement('h2');
        categoryTitle.style.color = '#667eea';
        categoryTitle.style.marginTop = '30px';
        categoryTitle.style.borderBottom = '2px solid #e0e0e0';
        categoryTitle.style.paddingBottom = '10px';
        categoryTitle.textContent = `${category} (${items.length} Q&As)`;
        container.appendChild(categoryTitle);

        items.forEach((item, index) => {
          const faqItem = document.createElement('div');
          faqItem.className = 'faq-item';
          faqItem.innerHTML = `
            <div class="faq-question" onclick="toggleAnswer(this)">
              <span>${totalCount + index + 1}. ${item.q}</span>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="faq-answer">
              ${item.a.includes('\\n') ? '<div class="code-block">' + item.a.replace(/\n/g, '<br>') + '</div>' : '<p>' + item.a + '</p>'}
            </div>
          `;
          container.appendChild(faqItem);
        });

        totalCount += items.length;
      });
    }

    function filterByCategory(category) {
      const container = document.getElementById('faqContainer');
      container.innerHTML = '';
      
      const categoryTitle = document.createElement('h2');
      categoryTitle.style.color = '#667eea';
      categoryTitle.textContent = `${category} (${faqDatabase[category].length} Q&As)`;
      container.appendChild(categoryTitle);

      faqDatabase[category].forEach((item, index) => {
        const faqItem = document.createElement('div');
        faqItem.className = 'faq-item';
        faqItem.innerHTML = `
          <div class="faq-question" onclick="toggleAnswer(this)">
            <span>${index + 1}. ${item.q}</span>
            <span class="toggle-icon">▼</span>
          </div>
          <div class="faq-answer">
            ${item.a.includes('\\n') ? '<div class="code-block">' + item.a.replace(/\n/g, '<br>') + '</div>' : '<p>' + item.a + '</p>'}
          </div>
        `;
        container.appendChild(faqItem);
      });
    }

    function toggleAnswer(element) {
      element.classList.toggle('active');
      element.nextElementSibling.classList.toggle('active');
      element.querySelector('.toggle-icon').style.transform = 
        element.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    document.getElementById('searchBox').addEventListener('keyup', (e) => {
      const query = e.target.value.toLowerCase();
      const allItems = document.querySelectorAll('.faq-item');
      
      allItems.forEach(item => {
        const question = item.querySelector('.faq-question span').textContent.toLowerCase();
        const answer = item.querySelector('.faq-answer').textContent.toLowerCase();
        
        if (question.includes(query) || answer.includes(query)) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    });
