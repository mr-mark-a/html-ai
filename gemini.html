<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=https://gemini.google.com/app" />
    <script>
        // Fallback JavaScript redirect in case meta refresh is ignored
        window.location.replace('https://gemini.google.com/app');
    </script>
</head>

<body>
    <p>If you are not redirected automatically, <a href="https://gemini.google.com/app">click here</a>.</p>
</body>

</html>
