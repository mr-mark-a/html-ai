<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
        .header h1 {
            font-size: 28px;
        }
        .back-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #0056b3;
        }
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .song-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            border: 2px solid transparent;
        }
        .song-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 0, 0, 0.8);
            border-color: #667eea;
        }
        .song-card-art {
            width: 100%;
            height: 150px;
            background: #333;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 48px;
        }
        .song-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .song-name {
            font-weight: bold;
            font-size: 14px;
            word-wrap: break-word;
            margin-bottom: 8px;
        }
        .play-song-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
            width: 100%;
        }
        .play-song-btn:hover {
            background: #0056b3;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }
        @media (max-width: 768px) {
            .library-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 Music Library</h1>
        <button class="back-btn" onclick="window.history.back()">← Back to Player</button>
    </div>

    <div class="library-grid" id="library-grid">
        <div class="empty-message">Loading library...</div>
    </div>

    <script>
        function sanitizeName(name) {
            let s = name.replace(/\.(mp3|wav)$/i, '');
            s = s.replace(/_/g, ' ');
            s = s.replace(/3AND3/g, '&');
            return s;
        }

        function loadLibrary() {
            const playlist = JSON.parse(localStorage.getItem('musicPlaylist') || '[]');
            const grid = document.getElementById('library-grid');

            if (playlist.length === 0) {
                grid.innerHTML = '<div class="empty-message">No songs in library. Add songs from the main player.</div>';
                return;
            }

            grid.innerHTML = '';
            playlist.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'song-card';
                const display = sanitizeName(song.name);

                let imageHtml = '';
                if (song.image) {
                    imageHtml = `<img src="${song.image}" alt="${display}">`;
                } else {
                    imageHtml = '<div class="song-card-art">🎵</div>';
                }

                card.innerHTML = `
                    ${imageHtml}
                    <div class="song-name">${display}</div>
                    <button class="play-song-btn" onclick="playSong(${index})">Play</button>
                `;
                grid.appendChild(card);
            });
        }

        function playSong(index) {
            localStorage.setItem('selectedSongIndex', index);
            window.location.href = 'Mmusic.html';
        }

        loadLibrary();
    </script>
</body>
</html>
