<!DOCTYPE html>
<html>

<head>
    <title>Download Play24! For Mac</title>
    <style>
        .btn {
            background: #ffffff;
            /* blue */
            color: #fff;
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform .2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #fff;
        }
    </style>
</head>
<body>
    <a href="https://tinyurl.com/DNLDMACOS" id="downloadMacBtn" class="btn">
        <img src="Save.PNG" alt="Save" style="height:150px; width:auto;">
    </a>
    <script>
      document.getElementById('downloadMacBtn').addEventListener('click', function() {
        setTimeout(function() {
          window.location.href = '../marks-games.html';
        }, 3000);
      });
    </script>
</body>

</html>
