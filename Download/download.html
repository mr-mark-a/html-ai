<!DOCTYPE html>
<html>

<head>
    <title>Download</title>
    <style>
        body {
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .btn {
            background: #ffffff;
            color: #fff;
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform .2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <h2 style="text-align:center; margin-bottom:20px;">Download For</h2>
    <div class="button-container">
        <a href="https://tinyurl.com/DNLDMACOS" class="btn"><img src="Mac.PNG" alt="Mac" style="height:150px; width:auto;"></a>
        <a href="Windows.html" class="btn"><img src="Windows.png" alt="Windows" style="height:150px; width:auto;"></a>
    </div>
</body>

</html>
