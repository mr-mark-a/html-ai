<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Industrial Tycoon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #064e3b;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        #main-menu {
            position: fixed;
            inset: 0;
            background: #064e3b;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }
        #storage-selection {
            display: none;
        }
        #grid-canvas {
            flex-grow: 1;
            background-color: #065f46;
            background-image: 
                linear-gradient(to right, #064e3b 1px, transparent 1px),
                linear-gradient(to bottom, #064e3b 1px, transparent 1px);
            background-size: 60px 60px;
            cursor: pointer;
        }
        .ui-panel {
            background: rgba(10, 10, 10, 0.98);
            border-top: 3px solid #059669;
            padding: 15px;
            user-select: none;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border-left: 4px solid #10b981;
            animation: slideIn 0.3s ease-out;
            z-index: 1100;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>

<div id="main-menu">
    <div id="initial-screen" class="text-center flex flex-col items-center gap-4">
        <h1 class="text-5xl font-black text-emerald-400 mb-8 tracking-tighter italic">EMPIRE BUILDER</h1>
        <button onclick="showStorageOptions()" class="w-64 bg-emerald-500 hover:bg-emerald-400 text-black font-black text-xl px-8 py-4 rounded-full shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all transform hover:scale-105 active:scale-95 uppercase">
            New Game
        </button>
        <button onclick="triggerFileLoad()" class="w-64 bg-zinc-800 hover:bg-zinc-700 text-emerald-400 font-bold text-lg px-8 py-4 rounded-full border border-emerald-900 transition-all transform hover:scale-105 active:scale-95 uppercase">
            Resume Game
        </button>
    </div>

    <div id="storage-selection" class="bg-black p-8 rounded-2xl border-2 border-emerald-500 max-w-md w-full mx-4 text-center">
        <h2 class="text-2xl font-black text-emerald-400 mb-2 uppercase">Storage Setup</h2>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="selectStorage('device')" class="bg-zinc-800 hover:bg-zinc-700 p-6 rounded-xl transition flex flex-col items-center group">
                <span class="text-4xl mb-2">💾</span>
                <span class="font-bold text-white uppercase tracking-widest">Local Device</span>
            </button>
        </div>
        <button onclick="backToMenu()" class="mt-4 text-emerald-700 hover:text-emerald-500 text-xs font-bold uppercase tracking-widest">Back</button>
    </div>
</div>

<input type="file" id="file-input" style="display: none;" accept=".GRNWORLD">

<div id="rename-modal" class="modal-overlay">
    <div class="bg-zinc-900 p-6 rounded-xl border border-emerald-900 w-80">
        <h3 class="text-lg font-bold mb-4 text-emerald-500">Rename Company</h3>
        <input type="text" id="name-input" class="w-full bg-black border border-emerald-800 p-2 rounded mb-4 text-white outline-none" maxlength="20">
        <div class="flex gap-2">
            <button onclick="closeRenameModal()" class="flex-1 bg-zinc-800 py-2 rounded text-sm">Cancel</button>
            <button onclick="saveName()" class="flex-1 bg-emerald-600 py-2 rounded text-sm font-bold">Save</button>
        </div>
    </div>
</div>

<div id="game-container">
    <div class="flex justify-between items-center p-4 bg-black border-b border-emerald-900">
        <div>
            <div class="flex items-center gap-2">
                <h1 id="company-name" class="text-xl font-bold text-emerald-400 uppercase tracking-wider">GREEN EMPIRE</h1>
                <button onclick="openRenameModal()" class="text-zinc-600 hover:text-white transition">✎</button>
            </div>
            <div class="flex gap-2 mt-1">
                <button onclick="handleManualSave()" class="text-[10px] bg-emerald-600 px-3 py-1 rounded text-white font-black">Save File</button>
            </div>
        </div>
        <div class="text-right">
            <div id="money-display" class="text-2xl font-black text-emerald-400">$0</div>
            <div id="income-display" class="text-xs text-emerald-600">+$0/sec</div>
            <div id="cit-display" class="text-lg font-bold text-amber-400">
                <span id="cit-count">0</span> <span class="text-xs">🐱M</span>
            </div>
        </div>
    </div>

    <canvas id="grid-canvas"></canvas>

    <div class="ui-panel">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="flex flex-col gap-1">
                <label class="text-[10px] uppercase font-bold text-emerald-600">Build</label>
                <select id="build-dropdown" onchange="selectBuilding(this.value)" class="bg-zinc-900 border border-emerald-800 p-3 rounded-lg text-white font-bold outline-none"></select>
            </div>
            <div class="grid grid-cols-2 gap-1">
                <button onclick="buyCit()" class="bg-amber-600 p-2 rounded-lg text-black text-[10px] font-black uppercase">Get Cit ($50)</button>
                <button onclick="megaCombine()" class="bg-red-600 p-2 rounded-lg text-white text-[10px] font-black uppercase">Combine (50)</button>
            </div>
        </div>
        <div class="flex items-center justify-between gap-4">
            <div class="flex-grow">
                <div class="flex justify-between text-[10px] font-bold text-zinc-500 mb-1">
                    <span>Permits</span>
                    <span id="limit-text">0 / 10</span>
                </div>
                <div class="w-full h-2 bg-black rounded-full overflow-hidden">
                    <div id="limit-bar" class="h-full bg-emerald-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <button id="clear-btn" onclick="toggleDemolish()" class="bg-red-950/30 text-red-600 px-4 py-2 rounded-lg border border-red-900 font-bold text-xs">Demolish: OFF</button>
        </div>
    </div>
</div>

<script>
    const BUILDINGS = [
        { id: 'extractor', name: 'Eco-Mine', cost: 50, income: 5, color: '#059669', icon: '🌿', size: 1 },
        { id: 'processor', name: 'Refinery', cost: 250, income: 25, color: '#047857', icon: '♻️', size: 1 },
        { id: 'factory', name: 'Assembler', cost: 1200, income: 150, color: '#065f46', icon: '📦', size: 1 },
        { id: 'power_plant', name: 'Solar Array', cost: 5000, income: 750, color: '#10b981', icon: '☀️', size: 1 },
        { id: 'combined', name: 'Titan', cost: Infinity, income: 10000, color: '#b91c1c', icon: '🏭', size: 1 }
    ];

    let gameState = {
        money: 100,
        cits: 0,
        buildings: [], 
        companyName: "GREEN EMPIRE",
        buildingLimit: 10,
        selectedType: 'extractor',
        demolishMode: false,
        cellSize: 60
    };

    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    const buildDropdown = document.getElementById('build-dropdown');

    // UI Handlers
    window.showStorageOptions = () => { 
        document.getElementById('initial-screen').style.display = 'none'; 
        document.getElementById('storage-selection').style.display = 'block'; 
    };
    window.backToMenu = () => { 
        document.getElementById('initial-screen').style.display = 'block'; 
        document.getElementById('storage-selection').style.display = 'none'; 
    };

    window.selectStorage = (type) => {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        initGame();
    };

    function initGame() {
        resize();
        populateDropdown();
        const saved = localStorage.getItem('local_save');
        if (saved) Object.assign(gameState, JSON.parse(saved));
        updateUI();
        requestAnimationFrame(gameLoop);
        setInterval(() => {
            localStorage.setItem('local_save', JSON.stringify(gameState));
        }, 5000);
    }

    function populateDropdown() {
        buildDropdown.innerHTML = BUILDINGS.filter(b => b.id !== 'combined').map(b => 
            `<option value="${b.id}">${b.icon} ${b.name} ($${b.cost})</option>`
        ).join('');
    }

    function resize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }

    window.buyCit = () => {
        if (gameState.money >= 50) {
            gameState.money -= 50;
            gameState.cits++;
            showToast("Purchased CIT!", "#fbbf24");
        }
    };

    window.megaCombine = () => {
        if (gameState.cits >= 50) {
            gameState.cits -= 50;
            gameState.buildings = [{ x: 2, y: 2, typeId: 'combined' }];
            showToast("TITAN AWAKENED!", "#ef4444");
        }
    };

    window.toggleDemolish = () => {
        gameState.demolishMode = !gameState.demolishMode;
        document.getElementById('clear-btn').innerText = gameState.demolishMode ? "Demolish: ON" : "Demolish: OFF";
    };

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / gameState.cellSize);
        const y = Math.floor((e.clientY - rect.top) / gameState.cellSize);
        
        const idx = gameState.buildings.findIndex(b => b.x === x && b.y === y);
        if (gameState.demolishMode) {
            if (idx !== -1) gameState.buildings.splice(idx, 1);
        } else if (idx === -1) {
            const type = BUILDINGS.find(b => b.id === gameState.selectedType);
            if (gameState.money >= type.cost && gameState.buildings.length < gameState.buildingLimit) {
                gameState.money -= type.cost;
                gameState.buildings.push({ x, y, typeId: type.id });
            }
        }
    });

    let lastTick = Date.now();
    function gameLoop() {
        if (Date.now() - lastTick >= 1000) {
            gameState.buildings.forEach(b => {
                const type = BUILDINGS.find(t => t.id === b.typeId);
                gameState.money += type.income;
            });
            lastTick = Date.now();
        }
        updateUI();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        document.getElementById('money-display').innerText = `$${Math.floor(gameState.money)}`;
        document.getElementById('cit-count').innerText = gameState.cits;
        document.getElementById('company-name').innerText = gameState.companyName;
        const usage = (gameState.buildings.length / gameState.buildingLimit) * 100;
        document.getElementById('limit-bar').style.width = usage + "%";
        document.getElementById('limit-text').innerText = `${gameState.buildings.length} / ${gameState.buildingLimit}`;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        gameState.buildings.forEach(b => {
            const type = BUILDINGS.find(t => t.id === b.typeId);
            ctx.fillStyle = type.color;
            ctx.fillRect(b.x * gameState.cellSize + 5, b.y * gameState.cellSize + 5, 50, 50);
            ctx.fillStyle = "white";
            ctx.fillText(type.icon, b.x * gameState.cellSize + 20, b.y * gameState.cellSize + 35);
        });
    }

    function showToast(m, c) {
        const t = document.createElement('div');
        t.className = 'notification';
        t.innerText = m;
        t.style.borderLeftColor = c;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    window.selectBuilding = (val) => gameState.selectedType = val;
    window.openRenameModal = () => document.getElementById('rename-modal').style.display = 'flex';
    window.closeRenameModal = () => document.getElementById('rename-modal').style.display = 'none';
    window.saveName = () => {
        gameState.companyName = document.getElementById('name-input').value || "GREEN EMPIRE";
        closeRenameModal();
    };
    window.handleManualSave = () => {
        const data = JSON.stringify(gameState);
        const blob = new Blob([data], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'save.GRNWORLD';
        a.click();
    };
    window.triggerFileLoad = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            gameState = JSON.parse(ev.target.result);
            selectStorage('device');
        };
        reader.readAsText(e.target.files[0]);
    };
</script>
</body>
</html>
