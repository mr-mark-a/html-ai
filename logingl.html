<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Options</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login/mainlogin.css" />
</head>

<body>
    <div class="login-container">
        <h1 class="login-title">Welcome – Choose a login method</h1>
        <div class="login-buttons">
            <button class="login-btn google" id="google-login">Login with Google</button>
            <button class="login-btn apple" id="apple-login">Login with Apple</button>
            <button class="login-btn zipline" id="zipline-login">Login with ZIPLINE</button>
        </div>
    </div>

    <script src="login/google.js"></script>
    <script src="login/apple.js"></script>
    <script src="login/ZIPLINElogin.js"></script>
</body>

</html>
