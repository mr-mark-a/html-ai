<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaDEX - User Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .form-group.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 1em;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .required-text {
            color: #e74c3c;
            font-size: 0.9em;
            display: none;
        }

        .required-text.show {
            display: inline;
        }

        .hint-text {
            color: #999;
            font-size: 0.85em;
            margin-top: 4px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-next {
            background: #667eea;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-next:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
            flex: 1;
            max-width: 200px;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .success-screen {
            display: none;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }

        .success-screen.show {
            display: block;
        }

        .success-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .success-message {
            color: #27ae60;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .user-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin: 20px 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #555;
        }

        .detail-value {
            color: #667eea;
            font-weight: bold;
        }

        .aneln-format {
            background: #667eea;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            word-break: break-all;
            text-align: center;
        }

        .aneln-label {
            font-size: 0.8em;
            opacity: 0.9;
            display: block;
            margin-bottom: 8px;
        }

        .btn-continue-to-main {
            background: #27ae60;
            color: white;
            margin-top: 20px;
        }

        .btn-continue-to-main:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
        }

        .btn-edit {
            background: #f39c12;
            color: white;
            margin-top: 10px;
        }

        .btn-edit:hover {
            background: #e67e22;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 33.33%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Section -->
        <div id="formSection">
            <h1>👋 Welcome</h1>
            <p class="subtitle">Tell us about yourself</p>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- First Name -->
            <div class="form-group active" id="firstNameGroup">
                <label for="firstName">First Name <span class="required-text show">*</span></label>
                <input type="text" id="firstName" placeholder="Enter your first name" autocomplete="off">
                <div class="hint-text">This will be used to identify your profile</div>
            </div>

            <!-- Last Name and Email (shown only if first name is empty) -->
            <div id="additionalFields" style="display: none;">
                <div class="form-group active">
                    <label for="lastName">Last Name <span class="required-text show">*</span></label>
                    <input type="text" id="lastName" placeholder="Enter your last name" autocomplete="off">
                </div>

                <div class="form-group active">
                    <label for="email">Email <span class="required-text show">*</span></label>
                    <input type="email" id="email" placeholder="Enter your email address" autocomplete="off">
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-next" id="submitBtn">Continue</button>
                <button type="button" class="btn-reset" id="resetBtn">Reset</button>
            </div>
        </div>

        <!-- Success Screen -->
        <div class="success-screen" id="successScreen">
            <div class="success-icon">✅</div>
            <div class="success-message">Profile Created Successfully!</div>

            <div class="user-details">
                <div class="detail-row">
                    <span class="detail-label">First Name:</span>
                    <span class="detail-value" id="displayFirstName">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Last Name:</span>
                    <span class="detail-value" id="displayLastName">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email:</span>
                    <span class="detail-value" id="displayEmail">-</span>
                </div>
            </div>

            <div class="aneln-format">
                <span class="aneln-label">Your ANELN File Format:</span>
                <span id="anelnFormat">appname@firstname@email@lastname.js</span>
            </div>

            <button type="button" class="btn-edit" id="editBtn">✏️ Edit Information</button>
            <button type="button" class="btn-continue-to-main" id="continueBtn">Continue to Main</button>
        </div>
    </div>

    <script>
        // State management
        const state = {
            firstName: '',
            lastName: '',
            email: '',
            formStep: 1
        };

        // DOM elements
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const emailInput = document.getElementById('email');
        const additionalFields = document.getElementById('additionalFields');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const formSection = document.getElementById('formSection');
        const successScreen = document.getElementById('successScreen');
        const progressFill = document.getElementById('progressFill');
        const editBtn = document.getElementById('editBtn');
        const continueBtn = document.getElementById('continueBtn');

        // Load saved data from localStorage on page load
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('userRegistrationData');
            if (saved) {
                const data = JSON.parse(saved);
                state.firstName = data.firstName;
                state.lastName = data.lastName;
                state.email = data.email;
                showSuccessScreen();
            }
        });

        // Check first name input and show/hide additional fields
        firstNameInput.addEventListener('input', () => {
            if (firstNameInput.value.trim() === '') {
                additionalFields.style.display = 'block';
            } else {
                additionalFields.style.display = 'none';
            }
        });

        // Submit form
        submitBtn.addEventListener('click', () => {
            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const email = emailInput.value.trim();

            // Validation
            if (firstName === '') {
                alert('First name is required!');
                return;
            }

            if (firstName && lastName === '' && email === '') {
                // Only first name provided
                state.firstName = firstName;
                state.lastName = '';
                state.email = '';
            } else if (firstName === '' || lastName === '' || email === '') {
                // If name is empty, require last name and email
                alert('Please fill in all required fields: Last Name and Email');
                return;
            } else {
                state.firstName = firstName;
                state.lastName = lastName;
                state.email = email;
            }

            // Save to localStorage
            localStorage.setItem('userRegistrationData', JSON.stringify(state));

            // Show success screen
            showSuccessScreen();
        });

        // Reset form
        resetBtn.addEventListener('click', () => {
            firstNameInput.value = '';
            lastNameInput.value = '';
            emailInput.value = '';
            additionalFields.style.display = 'none';
            state.firstName = '';
            state.lastName = '';
            state.email = '';
        });

        // Show success screen
        function showSuccessScreen() {
            formSection.style.display = 'none';
            successScreen.classList.add('show');
            progressFill.style.width = '100%';

            // Display user info
            const firstName = state.firstName;
            const lastName = state.lastName || 'Unknown';
            const email = state.email || 'Not provided';

            document.getElementById('displayFirstName').textContent = firstName;
            document.getElementById('displayLastName').textContent = lastName;
            document.getElementById('displayEmail').textContent = email;

            // Generate ANELN format
            const anelnFormat = `appname@${firstName}@${email}@${lastName}.js`;
            document.getElementById('anelnFormat').textContent = anelnFormat;

            // Copy to clipboard on click
            document.getElementById('anelnFormat').style.cursor = 'pointer';
            document.getElementById('anelnFormat').addEventListener('click', function() {
                navigator.clipboard.writeText(this.textContent);
                alert('ANELN format copied to clipboard!');
            });
        }

        // Edit button
        editBtn.addEventListener('click', () => {
            successScreen.classList.remove('show');
            formSection.style.display = 'block';
            progressFill.style.width = '33.33%';
            firstNameInput.value = state.firstName;
            lastNameInput.value = state.lastName;
            emailInput.value = state.email;
            if (state.firstName) {
                additionalFields.style.display = 'none';
            } else {
                additionalFields.style.display = 'block';
            }
        });

        // Continue to main
        continueBtn.addEventListener('click', () => {
            // Redirect to main page or app launcher
            window.location.href = '/MaDEX/android/Madex.html';
        });
    </script>
</body>
</html>
