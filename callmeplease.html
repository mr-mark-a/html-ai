<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Dialer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --phone-bg: rgba(15, 23, 42, 0.6);
            --phone-border: rgba(255, 255, 255, 0.08);
            --key-bg: rgba(255, 255, 255, 0.05);
            --key-hover: rgba(255, 255, 255, 0.1);
            --key-active: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --call-btn-color: #10b981;
            --call-btn-hover: #059669;
            --end-btn-color: #ef4444;
            --end-btn-hover: #dc2626;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Abstract glowing background orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: drift 15s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: #10b981;
            top: 20%; left: 25%;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: #6366f1;
            bottom: 10%; right: 20%;
            animation-delay: -5s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, -50px); }
        }

        .phone-container {
            position: relative;
            z-index: 10;
            width: 340px;
            height: 680px;
            background: var(--phone-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--phone-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Dialer Screen --- */
        #dialer-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .display-area {
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 2rem;
        }

        .number-display {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            height: 3rem;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .add-number-text {
            color: var(--call-btn-color);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .add-number-text.visible {
            opacity: 1;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem 1.5rem;
            justify-items: center;
            margin-bottom: auto;
        }

        .key {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--key-bg);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key:hover {
            background: var(--key-hover);
            border-color: rgba(255,255,255,0.1);
        }

        .key:active {
            background: var(--key-active);
            transform: scale(0.92);
        }

        .key-num {
            font-size: 1.8rem;
            font-weight: 400;
            line-height: 1;
        }

        .key-letters {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 2px;
            height: 10px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            justify-items: center;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--call-btn-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .call-btn:hover {
            background: var(--call-btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4);
        }

        .call-btn:active {
            transform: translateY(2px) scale(0.95);
        }

        .call-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .delete-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .delete-btn:hover {
            color: var(--text-main);
        }
        .delete-btn:active {
            transform: scale(0.9);
        }


        /* --- Calling Screen --- */
        #calling-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--phone-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem 3rem 1.5rem;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        #calling-screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .caller-status {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 300;
        }

        .caller-number {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 3rem;
            text-align: center;
            word-break: break-all;
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #475569, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #94a3b8;
            position: relative;
            z-index: 2;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Pulsing animation for calling */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.3);
            z-index: 1;
            animation: pulse 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 1s;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .call-controls {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn:hover { background: rgba(255,255,255,0.2); }
        .control-btn.active-toggle { background: white; color: black; }

        .end-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--end-btn-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .end-btn:hover {
            background: var(--end-btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(239, 68, 68, 0.4);
        }

        .end-btn:active {
            transform: translateY(2px) scale(0.95);
        }

        .end-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            transform: rotate(135deg); /* Point phone down to end call */
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="phone-container">
        
        <!-- Dialer Screen -->
        <div id="dialer-screen">
            <div class="display-area">
                <div class="number-display" id="display"></div>
                <div class="add-number-text" id="add-text">Add Number</div>
            </div>

            <div class="keypad">
                <div class="key" onclick="press('1')">
                    <span class="key-num">1</span>
                    <span class="key-letters"><span style="visibility:hidden">_</span></span>
                </div>
                <div class="key" onclick="press('2')">
                    <span class="key-num">2</span>
                    <span class="key-letters">ABC</span>
                </div>
                <div class="key" onclick="press('3')">
                    <span class="key-num">3</span>
                    <span class="key-letters">DEF</span>
                </div>
                <div class="key" onclick="press('4')">
                    <span class="key-num">4</span>
                    <span class="key-letters">GHI</span>
                </div>
                <div class="key" onclick="press('5')">
                    <span class="key-num">5</span>
                    <span class="key-letters">JKL</span>
                </div>
                <div class="key" onclick="press('6')">
                    <span class="key-num">6</span>
                    <span class="key-letters">MNO</span>
                </div>
                <div class="key" onclick="press('7')">
                    <span class="key-num">7</span>
                    <span class="key-letters">PQRS</span>
                </div>
                <div class="key" onclick="press('8')">
                    <span class="key-num">8</span>
                    <span class="key-letters">TUV</span>
                </div>
                <div class="key" onclick="press('9')">
                    <span class="key-num">9</span>
                    <span class="key-letters">WXYZ</span>
                </div>
                <div class="key" onclick="press('*')">
                    <span class="key-num">*</span>
                    <span class="key-letters"></span>
                </div>
                <div class="key" onclick="press('0')">
                    <span class="key-num">0</span>
                    <span class="key-letters">+</span>
                </div>
                <div class="key" onclick="press('#')">
                    <span class="key-num">#</span>
                    <span class="key-letters"></span>
                </div>
            </div>

            <div class="action-row">
                <div></div> <!-- spacer -->
                <button class="call-btn" onclick="startCall()">
                    <svg viewBox="0 0 24 24">
                        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                    </svg>
                </button>
                <button class="delete-btn" id="delete-btn" onclick="deleteChar()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                        <line x1="18" y1="9" x2="12" y2="15"></line>
                        <line x1="12" y1="9" x2="18" y2="15"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Calling Screen -->
        <div id="calling-screen">
            <div class="caller-status" id="call-status">calling...</div>
            <div class="caller-number" id="calling-number">Unknown</div>
            
            <div class="avatar-container">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="avatar">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="call-controls">
                <button class="control-btn" onclick="toggleMute(this)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <button class="control-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
                <button class="control-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                    </svg>
                </button>
            </div>

            <button class="end-btn" onclick="endCall()">
                <svg viewBox="0 0 24 24">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
            </button>
        </div>

    </div>

    <script src="callonhold.js"></script>
</body>
</html>
