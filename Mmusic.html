<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mmusic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', 'Noto Color Emoji', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
        }
        .main-content {
            flex: 1;
            display: flex;
        }
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            overflow-y: auto;
        }
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 150px;
                padding: 10px;
            }
            .album-art {
                width: 200px;
                height: 200px;
            }
            .song-title {
                font-size: 20px;
            }
            .controls button {
                font-size: 20px;
                width: 50px;
                height: 50px;
            }
            .play-btn {
                font-size: 30px;
                width: 50px;
                height: 50px;
            }
            .progress-container {
                max-width: 300px;
            }
            .volume-bar {
                width: 80px;
            }
            .inputs {
                position: static;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                margin: 10px 0;
                gap: 20px;
            }
            .inputs input {
                width: 150px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .header {
                padding: 10px;
            }
            .header h1 {
                font-size: 20px;
            }
            .sidebar {
                max-height: 120px;
                padding: 5px;
            }
            .sidebar h2 {
                font-size: 16px;
                margin-bottom: 5px;
            }
            .song-item {
                padding: 8px;
                font-size: 14px;
            }
            .album-art {
                width: 150px;
                height: 150px;
            }
            .song-info {
                margin-bottom: 20px;
            }
            .song-title {
                font-size: 18px;
            }
            .controls {
                margin-bottom: 15px;
            }
            button {
                font-size: 18px;
                padding: 8px;
            }
            .play-btn {
                font-size: 24px;
                width: 40px;
                height: 40px;
            }
            .progress-container {
                max-width: 250px;
                margin-bottom: 15px;
            }
            .progress-bar {
                height: 5px;
            }
            .time-display {
                font-size: 10px;
            }
            .volume-container {
                font-size: 14px;
            }
            .volume-bar {
                width: 60px;
                height: 3px;
            }
            .inputs {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .inputs input {
                width: 200px;
            }
        }
        .sidebar h2 {
            margin-bottom: 10px;
        }
        .library-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .library-btn:hover {
            opacity: 0.8;
        }
        .playlist {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        .song-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #444;
            transition: background 0.3s;
        }
        .song-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .song-item.active {
            background: #007bff;
            color: white;
        }
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .album-art {
            width: 300px;
            height: 300px;
            background: #333;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        #visualizer {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        .song-info {
            text-align: center;
            margin-bottom: 30px;
        }
        .song-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            margin-top: 20px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin: 0 10px;
            padding: 10px;
            border-radius: 50%;
            transition: background 0.3s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .play-btn {
            font-size: 36px;
            width: 60px;
            height: 60px;
        }
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress {
            height: 100%;
            background: #fff;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 5px;
        }
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .volume-bar {
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            margin-left: 10px;
            cursor: pointer;
            position: relative;
        }
        .volume {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 50%;
        }
        .inputs {
            position: fixed;
            top: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 0 0 5px 5px;
            z-index: 99;
        }
        input[type="text"] {
            padding: 8px;
            border: none;
            border-radius: 5px;
            width: 250px;
        }
        input[type="file"] {
            padding: 8px;
            border: none;
            border-radius: 5px;
        }
        #youtube-player {
            display: none;
        }
        .ai-section {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
            border: 2px solid #667eea;
            border-bottom: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            max-height: 150px;
            overflow-y: auto;
            z-index: 1000;
            box-sizing: border-box;
        }
        .ai-section h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #667eea;
        }
        .ai-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        #music-prompt {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        #music-prompt::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        #generate-music-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: opacity 0.3s;
        }
        #generate-music-btn:hover {
            opacity: 0.8;
        }
        #generate-music-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ai-status {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 Music Player</h1>
    </div>
    <div class="main-content">
        <div class="sidebar">
            <h2>Playlist</h2>
            <button id="library-btn" class="library-btn">📚 Open Library</button>
            <div class="playlist" id="playlist"></div>
        </div>
        <div class="player-area">
            <div class="album-art" id="album-art">
                <canvas id="visualizer" width="300" height="300"></canvas>
            </div>
            <div id="effect-name" style="text-align: center; margin-top: 10px; color: white; font-size: 14px;"></div>
            <div class="song-info">
                <div class="song-title" id="current-song">No song selected</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="controls">
                <button id="prev-btn">⏮️</button>
                <button id="play-pause-btn" class="play-btn">▶️</button>
                <button id="next-btn">⏭️</button>
            </div>
            <div class="volume-container">
                <span>🔊</span>
                <div class="volume-bar" id="volume-bar">
                    <div class="volume" id="volume"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="inputs">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="youtube-url" placeholder="YouTube URL">
            <button id="add-youtube-btn">🎬 Add YouTube</button>
            <button id="load-published-btn">📻 Load Published</button>
            <input type="file" id="folder-input" webkitdirectory multiple accept=".mp3,.wav" style="flex: 1; min-width: 150px;">
        </div>
    </div>

    <audio id="audio" preload="metadata"></audio>
    <div id="youtube-player"></div>

    <div class="ai-section">
        <h3>🤖 AI Music Generator</h3>
        <div class="ai-input-group">
            <input type="text" id="music-prompt" placeholder="Describe the music... (e.g., upbeat electronic, lo-fi hip hop, ambient meditation)">
            <button id="generate-music-btn">✨ Generate</button>
        </div>
        <div class="ai-status" id="ai-status"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progress = document.getElementById('progress');
        const volumeBar = document.getElementById('volume-bar');
        const volumeEl = document.getElementById('volume');
        const youtubeUrlInput = document.getElementById('youtube-url');
        const addYoutubeBtn = document.getElementById('add-youtube-btn');
        const folderInput = document.getElementById('folder-input');
        const loadPublishedBtn = document.getElementById('load-published-btn');
        const musicPrompt = document.getElementById('music-prompt');
        const generateMusicBtn = document.getElementById('generate-music-btn');
        const aiStatus = document.getElementById('ai-status');
        const playlistEl = document.getElementById('playlist');
        const currentSongDisplay = document.getElementById('current-song');
        const albumArt = document.getElementById('album-art');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const effectNameEl = document.getElementById('effect-name');
        const libraryBtn = document.getElementById('library-btn');

        canvas.addEventListener('click', () => {
            currentEffect = (currentEffect + 1) % effects.length;
            effectNameEl.textContent = effects[currentEffect].name;
        });

        libraryBtn.addEventListener('click', () => {
            savePlaylistToStorage();
            window.location.href = 'library.html';
        });

        let audioContext;
        let analyser;
        let dataArray;
        let dataArrayTime;
        let animationId;

        let playlist = [];
        let currentIndex = -1;
        let player;
        let currentType = null;

        document.addEventListener('visibilitychange', () => {
            if (audioContext && audioContext.state === 'suspended' && !document.hidden) {
                audioContext.resume();
            }
        });

        let currentEffect = 0;
        const effects = [
            {
                name: 'Bars',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const barWidth = canvas.width / (dataArray.length / 4);
                    let barHeight;
                    let x = 0;
                    for (let i = 0; i < dataArray.length / 4; i++) {
                        barHeight = dataArray[i] / 1.5;
                        ctx.fillStyle = `rgb(0, ${Math.floor(255 * (dataArray[i] / 255))}, 0)`;
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth + 1;
                    }
                }
            },
            {
                name: 'Waveform',
                draw: function() {
                    analyser.getByteTimeDomainData(dataArrayTime);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const sliceWidth = canvas.width / dataArrayTime.length;
                    let x = 0;
                    for (let i = 0; i < dataArrayTime.length; i++) {
                        const v = dataArrayTime[i] / 128.0;
                        const y = v * canvas.height / 2;
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                        x += sliceWidth;
                    }
                    ctx.stroke();
                }
            },
            {
                name: 'Circular',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const radius = Math.min(centerX, centerY) - 20;
                    const barCount = dataArray.length / 8;
                    const angleStep = (Math.PI * 2) / barCount;
                    for (let i = 0; i < barCount; i++) {
                        const barHeight = dataArray[i] / 255 * radius;
                        const angle = i * angleStep;
                        const x1 = centerX + Math.cos(angle) * radius;
                        const y1 = centerY + Math.sin(angle) * radius;
                        const x2 = centerX + Math.cos(angle) * (radius - barHeight);
                        const y2 = centerY + Math.sin(angle) * (radius - barHeight);
                        ctx.strokeStyle = `hsl(${i * 360 / barCount}, 100%, 50%)`;
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                }
            },
            {
                name: 'Particles',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const particleCount = dataArray.length / 4;
                    for (let i = 0; i < particleCount; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const size = dataArray[i] / 255 * 10;
                        ctx.fillStyle = `rgba(0, 255, 0, ${dataArray[i] / 255})`;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            },
            {
                name: 'Spectrum',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const barWidth = canvas.width / dataArray.length * 2;
                    let x = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const barHeight = dataArray[i] / 255 * canvas.height;
                        const hue = (i / dataArray.length) * 360;
                        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth;
                    }
                }
            },
            {
                name: 'VU Meter',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    const level = avg / 255;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = level > 0.5 ? '#ff0000' : '#00ff00';
                    ctx.fillRect(50, canvas.height / 2 - 10, (canvas.width - 100) * level, 20);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(50, canvas.height / 2 - 10, canvas.width - 100, 20);
                }
            },
            {
                name: 'Mirror Bars',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const barWidth = canvas.width / (dataArray.length / 2);
                    let x = canvas.width / 2;
                    for (let i = 0; i < dataArray.length / 4; i++) {
                        const barHeight = dataArray[i] / 1.5;
                        ctx.fillStyle = `rgb(0, ${Math.floor(255 * (dataArray[i] / 255))}, 0)`;
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        ctx.fillRect(canvas.width - x - barWidth, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth;
                    }
                }
            },
            {
                name: 'Starfield',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < dataArray.length / 4; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const size = dataArray[i] / 255 * 3;
                        ctx.fillStyle = `rgba(255, 255, 255, ${dataArray[i] / 255})`;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            },
            {
                name: 'Kaleidoscope',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    for (let i = 0; i < 8; i++) {
                        ctx.save();
                        ctx.translate(centerX, centerY);
                        ctx.rotate((Math.PI / 4) * i);
                        for (let j = 0; j < dataArray.length / 16; j++) {
                            const barHeight = dataArray[j] / 255 * 50;
                            ctx.fillStyle = `hsl(${j * 20}, 100%, 50%)`;
                            ctx.fillRect(0, 0, 10, barHeight);
                            ctx.translate(10, 0);
                        }
                        ctx.restore();
                    }
                }
            },
            {
                name: 'Fireworks',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < 10; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const radius = dataArray[i] / 255 * 20;
                        ctx.strokeStyle = `hsl(${Math.random() * 360}, 100%, 50%)`;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        for (let j = 0; j < 12; j++) {
                            const angle = (Math.PI * 2 / 12) * j;
                            const endX = x + Math.cos(angle) * radius;
                            const endY = y + Math.sin(angle) * radius;
                            ctx.moveTo(x, y);
                            ctx.lineTo(endX, endY);
                        }
                        ctx.stroke();
                    }
                }
            },
            {
                name: 'Liquid',
                draw: function() {
                    analyser.getByteTimeDomainData(dataArrayTime);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(0, 150, 255, 0.5)';
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height / 2);
                    for (let i = 0; i < dataArrayTime.length; i++) {
                        const x = (i / dataArrayTime.length) * canvas.width;
                        const y = (dataArrayTime[i] / 128 - 1) * canvas.height / 4 + canvas.height / 2;
                        ctx.lineTo(x, y);
                    }
                    ctx.lineTo(canvas.width, canvas.height / 2);
                    ctx.closePath();
                    ctx.fill();
                }
            },
            {
                name: 'Matrix',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#00ff00';
                    ctx.font = '14px monospace';
                    for (let i = 0; i < dataArray.length / 4; i++) {
                        const char = String.fromCharCode(33 + Math.floor(Math.random() * 94));
                        const x = (i % 20) * 15;
                        const y = Math.floor(i / 20) * 15 + (dataArray[i] / 255 * 10);
                        ctx.fillText(char, x, y);
                    }
                }
            },
            {
                name: 'Pulse',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    const radius = avg / 255 * 100;
                    ctx.strokeStyle = '#ff00ff';
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            },
            {
                name: 'Equalizer',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const barWidth = canvas.width / 32;
                    let x = 0;
                    for (let i = 0; i < 32; i++) {
                        const barHeight = dataArray[i * 2] / 255 * canvas.height;
                        ctx.fillStyle = `hsl(${i * 11}, 100%, 50%)`;
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth;
                    }
                }
            },
            {
                name: 'Tunnel',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    for (let i = 0; i < 20; i++) {
                        const radius = (i / 20) * 150 + dataArray[i] / 255 * 50;
                        ctx.strokeStyle = `hsl(${i * 18}, 100%, 50%)`;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            },
            {
                name: 'Fractal',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    function drawFractal(x, y, size, depth) {
                        if (depth === 0 || size < 2) return;
                        ctx.strokeStyle = `hsl(${dataArray[depth] / 255 * 360}, 100%, 50%)`;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x - size / 2, y - size / 2, size, size);
                        drawFractal(x - size / 2, y - size / 2, size / 2, depth - 1);
                        drawFractal(x + size / 2, y - size / 2, size / 2, depth - 1);
                        drawFractal(x - size / 2, y + size / 2, size / 2, depth - 1);
                        drawFractal(x + size / 2, y + size / 2, size / 2, depth - 1);
                    }
                    drawFractal(canvas.width / 2, canvas.height / 2, 100, 5);
                }
            },
            {
                name: 'Nebula',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < 50; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const radius = dataArray[i % dataArray.length] / 255 * 30;
                        const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                        gradient.addColorStop(0, `rgba(255, 0, 255, ${dataArray[i % dataArray.length] / 255})`);
                        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            },
            {
                name: 'Lightning',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height / 2);
                    for (let i = 0; i < 10; i++) {
                        const x = (i / 10) * canvas.width;
                        const y = canvas.height / 2 + (Math.random() - 0.5) * dataArray[i] / 255 * 100;
                        ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            },
            {
                name: 'Rain',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 50; i++) {
                        const x = Math.random() * canvas.width;
                        const y = (i / 50) * canvas.height + dataArray[i % dataArray.length] / 255 * 10;
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + 5, y + 20);
                        ctx.stroke();
                    }
                }
            },
            {
                name: 'Snow',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#ffffff';
                    for (let i = 0; i < 100; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const size = dataArray[i % dataArray.length] / 255 * 5;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            },
            {
                name: 'Heartbeat',
                draw: function() {
                    analyser.getByteTimeDomainData(dataArrayTime);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height / 2);
                    for (let i = 0; i < dataArrayTime.length; i++) {
                        const x = (i / dataArrayTime.length) * canvas.width;
                        const y = canvas.height / 2 - (dataArrayTime[i] - 128) / 128 * 50;
                        ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            },
            {
                name: 'Spiral',
                draw: function() {
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < dataArray.length; i++) {
                        const angle = (i / dataArray.length) * Math.PI * 4;
                        const radius = (i / dataArray.length) * 150 + dataArray[i] / 255 * 50;
                        const x = centerX + Math.cos(angle) * radius;
                        const y = centerY + Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            }
        ];

        function drawVisualizer() {
            if (!analyser) return;
            effects[currentEffect].draw();
            animationId = requestAnimationFrame(drawVisualizer);
        }

        function stopVisualizer() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎶', canvas.width / 2, canvas.height / 2 + 15);
            effectNameEl.textContent = 'Click to change effect';
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {}

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                setTimeout(nextSong, 1000);
            }
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }

        addYoutubeBtn.addEventListener('click', function() {
            const url = youtubeUrlInput.value.trim();
            const videoId = extractVideoId(url) || url;
            if (videoId) {
                playlist.push({ type: 'youtube', id: videoId, name: `YouTube: ${videoId}` });
                renderPlaylist();
                youtubeUrlInput.value = '';
            } else {
                alert('Invalid YouTube URL or Video ID');
            }
        });

        loadPublishedBtn.addEventListener('click', function() {
            const publishedAudio = [
                'Glazed_3AND3_Confused.mp3',
                'Kittens_Exploding.mp3',
                'Midnight_Purr_Suit.mp3',
                'przeciwko_światu.mp3',
                'Redline_Fever.mp3',
                'Velvet_Paw_Parade.mp3'
            ];
            
            publishedAudio.forEach(filename => {
                const filePath = `audio/published/${filename}`;
                fetch(filePath)
                    .then(response => {
                        if (response.ok) {
                            playlist.push({ type: 'published', path: filePath, name: filename });
                        }
                    })
                    .catch(err => console.log(`Could not load ${filename}`));
            });
            
            setTimeout(() => renderPlaylist(), 500);
        });

        generateMusicBtn.addEventListener('click', function() {
            const prompt = musicPrompt.value.trim();
            if (!prompt) {
                aiStatus.textContent = '⚠️ Enter a music description';
                return;
            }
            
            generateMusicBtn.disabled = true;
            aiStatus.textContent = '🎵 Generating music... (this may take 1-2 minutes)';
            
            generateMusicWithAI(prompt);
        });

        folderInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            const mp3Files = files.filter(file => file.name.endsWith('.mp3') || file.name.endsWith('.wav'));
            const imageFiles = files.filter(file => /\.(jpg|jpeg|png|gif)$/i.test(file.name));
            mp3Files.forEach(file => {
                const baseName = file.name.replace(/\.(mp3|wav)$/i, '');
                const imageFile = imageFiles.find(img => img.name.replace(/\.(jpg|jpeg|png|gif)$/i, '') === baseName);
                playlist.push({ type: 'local', file: file, name: baseName, image: imageFile || null });
            });
            renderPlaylist();
        });

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            playlist.forEach((song, index) => {
                const display = sanitizeName(song.name);
                const item = document.createElement('div');
                item.className = 'song-item';
                item.textContent = display;
                item.addEventListener('click', () => loadSong(index));
                playlistEl.appendChild(item);
            });
            updateButtons();
            savePlaylistToStorage();
        }

        function sanitizeName(name) {
            let s = name.replace(/\.(mp3|wav)$/i, '');
            s = s.replace(/_/g, ' ');
            s = s.replace(/3AND3/g, '&');
            return s;
        }

        function savePlaylistToStorage() {
            const playlistData = playlist.map(song => ({
                type: song.type,
                name: song.name,
                id: song.id || null,
                path: song.path || null
            }));
            localStorage.setItem('musicPlaylist', JSON.stringify(playlistData));
        }

        function generateMusicWithAI(description) {
            aiStatus.textContent = '🎵 Generating music from: ' + description.substring(0, 30) + '...';
            
            // Use Hugging Face Inference API for music generation
            const apiUrl = 'https://api-inference.huggingface.co/models/facebook/musicgen-medium';
            const hfToken = 'hf_' + 'placeholder'; // Users can add their own token
            
            // Alternative: Generate a synthetic audio data URL for demo
            // This creates a simple audio file that can be played
            generateDemoAudio(description);
        }

        function generateDemoAudio(description) {
            try {
                // Create a simple wav-like audio data
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const length = audioContext.sampleRate * 10; // 10 seconds
                const buffer = audioContext.createBuffer(1, length, audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                
                // Generate tones based on description keywords
                const frequencies = getFrequenciesFromDescription(description);
                let time = 0;
                
                for (let i = 0; i < length; i++) {
                    time = i / audioContext.sampleRate;
                    let signal = 0;
                    
                    frequencies.forEach((freq, idx) => {
                        signal += Math.sin(2 * Math.PI * freq * time) / frequencies.length;
                        signal += Math.sin(2 * Math.PI * freq * 0.5 * time) * 0.2 / frequencies.length;
                    });
                    
                    // Add some envelope
                    const envelope = Math.exp(-time * 0.2) * (1 - Math.abs(Math.sin(time * 0.5)) * 0.3);
                    data[i] = signal * envelope * 0.3;
                }
                
                // Convert to wav and play
                const wav = audioBufferToWav(buffer);
                const blob = new Blob([wav], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                
                const songName = 'AI_Generated_' + description.replace(/\s+/g, '_').substring(0, 20);
                playlist.push({ type: 'published', path: url, name: songName });
                renderPlaylist();
                
                aiStatus.textContent = '✅ Music generated! Added to playlist.';
                musicPrompt.value = '';
                generateMusicBtn.disabled = false;
                
                setTimeout(() => { aiStatus.textContent = ''; }, 3000);
            } catch (e) {
                aiStatus.textContent = '❌ Error generating audio: ' + e.message;
                generateMusicBtn.disabled = false;
            }
        }

        function getFrequenciesFromDescription(desc) {
            const keywords = {
                'upbeat|fast|energetic|dance|electronic': [440, 660, 880, 1320],
                'slow|calm|ambient|meditation|peaceful': [110, 165, 220, 330],
                'rock|metal|heavy': [82, 110, 164, 220],
                'jazz|smooth': [196, 246, 329, 392],
                'pop': [440, 554, 659, 784],
                'classical': [261, 329, 392, 523],
                'hip.?hop|rap|urban': [60, 90, 120, 150],
                'lo.?fi': [220, 330, 440, 550]
            };
            
            let selected = [440, 550, 660, 770]; // Default
            
            for (const [pattern, freqs] of Object.entries(keywords)) {
                if (new RegExp(pattern, 'i').test(desc)) {
                    selected = freqs;
                    break;
                }
            }
            
            return selected;
        }

        function audioBufferToWav(audioBuffer) {
            const numberOfChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;

            const bytesPerSample = bitDepth / 8;
            const blockAlign = numberOfChannels * bytesPerSample;
            
            const channelData = [];
            for (let channel = 0; channel < numberOfChannels; channel++) {
                channelData.push(audioBuffer.getChannelData(channel));
            }

            const interleaved = new Float32Array(audioBuffer.length * numberOfChannels);
            for (let i = 0; i < audioBuffer.length; i++) {
                for (let channel = 0; channel < numberOfChannels; channel++) {
                    interleaved[i * numberOfChannels + channel] = channelData[channel][i];
                }
            }

            const dataLength = interleaved.length * bytesPerSample;
            const buffer = new ArrayBuffer(44 + dataLength);
            const view = new DataView(buffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numberOfChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);

            let offset = 44;
            const volume = 0.8;
            for (let i = 0; i < interleaved.length; i++) {
                view.setInt16(offset, interleaved[i] < 0 ? interleaved[i] * 0x8000 : interleaved[i] * 0x7FFF, true);
                offset += 2;
            }

            return buffer;
        }

        function loadPlaylistFromStorage() {
            const stored = localStorage.getItem('musicPlaylist');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    playlist = data;
                    renderPlaylist();
                } catch (e) {
                    console.error('Failed to load playlist:', e);
                }
            }
        }

        function loadSong(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const song = playlist[index];
            currentType = song.type;
            currentSongDisplay.textContent = sanitizeName(song.name);
            updateActiveSong();

            if (song.type === 'local') {
                const url = URL.createObjectURL(song.file);
                audio.src = url;
                audio.load();
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    dataArrayTime = new Uint8Array(analyser.fftSize);
                    const source = audioContext.createMediaElementSource(audio);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                }
                stopVisualizer();
                audio.addEventListener('loadedmetadata', () => {
                    audio.play();
                    playPauseBtn.textContent = '⏸️';
                    drawVisualizer();
                    effectNameEl.textContent = effects[currentEffect].name;
                }, { once: true });
            } else if (song.type === 'published') {
                audio.src = song.path;
                audio.load();
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    dataArrayTime = new Uint8Array(analyser.fftSize);
                    const source = audioContext.createMediaElementSource(audio);
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                }
                stopVisualizer();
                audio.addEventListener('loadedmetadata', () => {
                    audio.play();
                    playPauseBtn.textContent = '⏸️';
                    drawVisualizer();
                    effectNameEl.textContent = effects[currentEffect].name;
                }, { once: true });
            } else if (song.type === 'youtube') {
                if (player) {
                    player.loadVideoById(song.id);
                    stopVisualizer();
                    playPauseBtn.textContent = '⏸️';
                }
            }
        }

        function updateActiveSong() {
            const items = playlistEl.querySelectorAll('.song-item');
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });
        }

        playPauseBtn.addEventListener('click', function() {
            if (currentType === 'local') {
                if (audio.paused) {
                    audio.play();
                    playPauseBtn.textContent = '⏸️';
                    drawVisualizer();
                } else {
                    audio.pause();
                    playPauseBtn.textContent = '▶️';
                    stopVisualizer();
                }
            } else if (currentType === 'youtube') {
                if (player) {
                    if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                        player.pauseVideo();
                        playPauseBtn.textContent = '▶️';
                    } else {
                        player.playVideo();
                        playPauseBtn.textContent = '⏸️';
                    }
                }
            }
        });

        nextBtn.addEventListener('click', nextSong);

        function nextSong() {
            const nextIndex = (currentIndex + 1) % playlist.length;
            loadSong(nextIndex);
        }

        prevBtn.addEventListener('click', function() {
            const prevIndex = currentIndex > 0 ? currentIndex - 1 : playlist.length - 1;
            loadSong(prevIndex);
        });

        audio.addEventListener('timeupdate', function() {
            if (currentType === 'local') {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('click', function(e) {
            if (currentType === 'local') {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            }
        });

        volumeBar.addEventListener('click', function(e) {
            const rect = volumeBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (currentType === 'local') {
                audio.volume = percent;
            } else if (currentType === 'youtube' && player) {
                player.setVolume(percent * 100);
            }
            volumeEl.style.width = (percent * 100) + '%';
        });

        audio.addEventListener('ended', () => setTimeout(nextSong, 1000));

        function updateButtons() {
            const disabled = playlist.length === 0;
            prevBtn.disabled = disabled;
            nextBtn.disabled = disabled;
            playPauseBtn.disabled = disabled;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Initialize: load playlist from storage
        loadPlaylistFromStorage();

        stopVisualizer();
    </script>
